version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: distroviz_postgres
    environment:
      POSTGRES_USER: ${DISPATCH_DB_USER:-distroviz}
      POSTGRES_PASSWORD: ${DISPATCH_DB_PASSWORD:-secretpassword}
      POSTGRES_DB: ${DISPATCH_DB_NAME:-distroviz}
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DISPATCH_DB_USER:-distroviz}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - distroviz_network

  redis:
    image: redis:7-alpine
    container_name: distroviz_redis
    ports:
      - "${REDIS_PORT:-26379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - distroviz_network

  backend:
    build:
      context: .
      dockerfile: backend/dispatch-service/Dockerfile
    container_name: distroviz_backend
    env_file:
      - .env
    ports:
      - "${DISPATCH_API_PORT:-23001}:${DISPATCH_API_PORT:-23001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${DISPATCH_API_PORT:-23001}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - distroviz_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: distroviz_frontend
    ports:
      - "${FRONTEND_PORT:-24001}:80"
    depends_on:
      - backend
    networks:
      - distroviz_network
    restart: unless-stopped

networks:
  distroviz_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: