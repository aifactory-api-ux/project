version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: catstore_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catstore}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - catstore_network

  redis:
    image: redis:7-alpine
    container_name: catstore_redis
    command: redis-server --appendonly yes
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - catstore_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catstore_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-23001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-catstore}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
    ports:
      - "23001:23001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:23001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - catstore_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  catstore_network:
    driver: bridge
