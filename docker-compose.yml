version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: cencosud_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cencosud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-cencosud_news}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "21000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cencosud}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: cencosud_auth_service
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cencosud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-cencosud_news}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-23002}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
    ports:
      - "23002:23002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:23002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  news-service:
    build:
      context: .
      dockerfile: backend/news-service/Dockerfile
    container_name: cencosud_news_service
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cencosud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-cencosud_news}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEWS_SERVICE_PORT: ${NEWS_SERVICE_PORT:-23001}
    ports:
      - "23001:23001"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:23001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cencosud_frontend
    ports:
      - "3000:80"
    depends_on:
      - news-service
      - auth-service
    restart: unless-stopped
    networks:
      - cencosud_network

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: cencosud_network
    driver: bridge