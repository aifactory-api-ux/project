version: '3.8'

services:
  postgres:
    image: postgres:15.5
    container_name: distroviz_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-distroviz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-distrovizpass}
      POSTGRES_DB: ${POSTGRES_DB:-distroviz}
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-distroviz} -d ${POSTGRES_DB:-distroviz}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2.4
    container_name: distroviz_redis
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: distroviz_backend
    env_file:
      - .env
    ports:
      - "23001:23001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:23001/health || wget --spider -q http://localhost:23001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: distroviz_network
    driver: bridge